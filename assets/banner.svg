<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="320" viewBox="0 0 1280 320" role="img" aria-label="CERT-FLOW — certified route planning under drifting costs">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0.35" y2="1">
      <stop offset="0" stop-color="#0a111e"/>
      <stop offset="1" stop-color="#0e1b30"/>
    </linearGradient>
    <linearGradient id="bandfill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"   stop-color="#56B4E9" stop-opacity="0.10"/>
      <stop offset="0.5" stop-color="#56B4E9" stop-opacity="0.30"/>
      <stop offset="1"   stop-color="#56B4E9" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0a111e" stop-opacity="1"/>
      <stop offset="0.32" stop-color="#0a111e" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1280" height="320" fill="url(#bg)"/>

  <!-- ===== right: the certificate envelope as an instrument readout ===== -->
  <g font-family="ui-monospace, monospace">
    <g stroke="#16243c" stroke-width="1">
      <line x1="545" y1="110" x2="1245" y2="110"/>
      <line x1="545" y1="150" x2="1245" y2="150"/>
      <line x1="545" y1="190" x2="1245" y2="190"/>
      <line x1="545" y1="230" x2="1245" y2="230"/>
    </g>
    <line x1="545" y1="276" x2="1245" y2="276" stroke="#21324c" stroke-width="1.5"/>
    <text x="548" y="294" font-size="13" fill="#5d7494">fresh</text>
    <text x="1245" y="294" font-size="13" fill="#5d7494" text-anchor="end">drift &#8594; stale</text>

    <!-- band: widens with age, snaps tight at each observation, widest toward expiry -->
    <path d="M 560 156 L 815 118 L 815 156 L 1100 110 L 1100 156 L 1240 98
             L 1240 232 L 1100 174 L 1100 220 L 815 174 L 815 212 L 560 174 Z"
          fill="url(#bandfill)"/>
    <polyline points="560,156 815,118 815,156 1100,110 1100,156 1240,98"
              fill="none" stroke="#56B4E9" stroke-width="2" stroke-opacity="0.85"/>
    <polyline points="560,174 815,212 815,174 1100,220 1100,174 1240,232"
              fill="none" stroke="#0072B2" stroke-width="2" stroke-opacity="0.85" stroke-dasharray="6 5"/>
    <path d="M 560 166 C 650 159 710 171 815 165 C 905 157 985 173 1100 164
             C 1170 159 1212 169 1240 166"
          fill="none" stroke="#eef4fb" stroke-width="2.4"/>

    <g fill="#E8722D">
      <path d="M 553 138 L 567 138 L 560 150 Z"/>
      <path d="M 808 138 L 822 138 L 815 150 Z"/>
      <path d="M 1093 138 L 1107 138 L 1100 150 Z"/>
      <circle cx="560" cy="166" r="3.4"/>
      <circle cx="815" cy="165" r="3.4"/>
      <circle cx="1100" cy="164" r="3.4"/>
    </g>
    <text x="560" y="130" font-size="11.5" fill="#E8722D" text-anchor="middle">sense</text>

    <line x1="1240" y1="92" x2="1240" y2="238" stroke="#E8722D" stroke-width="1.4" stroke-dasharray="3 4" stroke-opacity="0.8"/>
    <text x="1234" y="88" font-size="12" fill="#E8722D" text-anchor="end">width &#8594; &#964;: expires</text>
  </g>

  <!-- left-edge fade so the wordmark sits on clean dark -->
  <rect width="560" height="320" fill="url(#fade)"/>

  <!-- ===== left: wordmark + certificate readout ===== -->
  <text x="58" y="150" font-family="Georgia, 'Times New Roman', serif" font-size="68" font-weight="bold" letter-spacing="1">
    <tspan fill="#eef4fb">CERT</tspan><tspan fill="#56B4E9">&#183;</tspan><tspan fill="#eef4fb">FLOW</tspan>
  </text>

  <rect x="60" y="170" width="252" height="36" rx="7" fill="#0f2236" stroke="#21324c" stroke-width="1"/>
  <text x="74" y="195" font-family="ui-monospace, monospace" font-size="20" letter-spacing="1">
    <tspan fill="#56B4E9">LB</tspan><tspan fill="#9fb6d4"> &#8804; </tspan><tspan fill="#eef4fb">OPT</tspan><tspan fill="#9fb6d4"> &#8804; </tspan><tspan fill="#56B4E9">UB</tspan>
  </text>

  <text x="60" y="234" font-family="Georgia, serif" font-size="19" fill="#a7bcd9">Certified route planning under drifting costs</text>
  <text x="60" y="266" font-family="ui-monospace, monospace" font-size="12.5" fill="#5d7494">conformal certificate &#183; sense to certify &#183; the claim degrades as the map goes stale</text>
</svg>
