<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="300" viewBox="0 0 1280 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="1" stop-color="#101b2e"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#56B4E9" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#56B4E9" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#56B4E9" stop-opacity="0.16"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="300" fill="url(#bg)"/>
  <!-- widening certificate band: the project's signature -->
  <path d="M 60 150 L 430 96 L 430 204 Z M 430 118 L 1240 38 L 1240 262 L 430 182 Z"
        fill="url(#band)"/>
  <path d="M 60 150 L 430 96 M 430 118 L 1240 38" stroke="#56B4E9"
        stroke-width="2" fill="none" opacity="0.85"/>
  <path d="M 60 150 L 430 204 M 430 182 L 1240 262" stroke="#0072B2"
        stroke-width="2" stroke-dasharray="7 5" fill="none" opacity="0.9"/>
  <!-- true cost wandering inside the band -->
  <path d="M 60 150 C 180 142, 260 158, 430 150 C 640 140, 800 162, 1000 150 C 1090 145, 1180 152, 1240 149"
        stroke="#e8eef7" stroke-width="2.5" fill="none"/>
  <!-- observation reset markers -->
  <path d="M 423 110 L 437 110 L 430 124 Z" fill="#D55E00"/>
  <circle cx="430" cy="150" r="4.5" fill="#D55E00"/>
  <!-- wordmark -->
  <text x="64" y="86" font-family="Georgia, 'Times New Roman', serif"
        font-size="58" font-weight="bold" fill="#f2f6fb" letter-spacing="1">CERT-FLOW</text>
  <text x="66" y="120" font-family="Consolas, 'Courier New', monospace"
        font-size="19" fill="#9fb6d4">LB &#8804; OPT &#8804; UB &#8212; certified route planning under drifting costs</text>
  <text x="66" y="256" font-family="Consolas, 'Courier New', monospace"
        font-size="15" fill="#5d7494">stale map &#183; paid sensing &#183; conformal certificate &#183; the moment drift exceeds &#964;, the claim says so</text>
</svg>
